server.port=8081
spring.application.name=kisan-user

# Eureka Discovery
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#Database Configuration (Kisan User DB)
spring.datasource.url=jdbc:mariadb://localhost:3306/kisan_user?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#JPA & HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect